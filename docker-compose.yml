services:
  db:
    image: mysql:8.0
    container_name: delivery-db
    restart: always
    environment:
      MYSQL_DATABASE: delivery_system_db
      MYSQL_ROOT_PASSWORD: YourSecurePassword123!
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: delivery-web
    restart: always
    ports:
      - "80:80"
    environment:
      - ConnectionStrings__DefaultConnection=Server=db;Database=delivery_system_db;User=root;Password=YourSecurePassword123!;Port=3306;
    depends_on:
      - db

volumes:
  db_data:
